<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Etsy OAuth Callback</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 640px; margin: 48px auto; padding: 0 24px; color: #111; background: #fafafa; }
    h1 { font-size: 1.4rem; }
    .code { font-family: ui-monospace, monospace; font-size: 13px; word-break: break-all; background: #fff; border: 1px solid #e4e4e7; border-radius: 8px; padding: 16px; margin: 16px 0; }
    button { background: #2563eb; color: #fff; border: 0; border-radius: 8px; padding: 10px 18px; font-size: 15px; cursor: pointer; margin-right: 8px; }
    button:hover { background: #1d4ed8; }
    .err { color: #b91c1c; }
    .hint { color: #52525b; font-size: 14px; line-height: 1.6; }
    .box { background: #fff; border: 1px solid #e4e4e7; border-radius: 12px; padding: 24px; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Etsy bağlantı kodu</h1>
  <div id="content" class="hint">Yükleniyor…</div>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const desc = params.get('error_description') || '';
    const el = document.getElementById('content');

    if (error) {
      el.innerHTML = '<div class="box"><p class="err"><strong>Hata:</strong> ' + error + '</p><p>' + desc + '</p></div>';
    } else if (code) {
      el.innerHTML =
        '<div class="box">' +
        '<p class="hint"><strong>Product Intelligence Studio</strong> uygulamasında açılan pencereye bu kodu yapıştır → <em>Bağlantıyı Tamamla</em>.</p>' +
        '<div class="code" id="code">' + code + '</div>' +
        '<button type="button" onclick="copyCode()">Kodu kopyala</button>' +
        '</div>' +
        '<p class="hint" style="margin-top:16px">ShopEntegro masaüstü uygulaması yüklüyse otomatik açılmayı deniyoruz…</p>';

      copyCode(true);

      try {
        const deepLink = new URL('shopentegro://oauth/callback');
        deepLink.searchParams.set('code', code);
        if (state) deepLink.searchParams.set('state', state);
        window.location.href = deepLink.toString();
      } catch (e) {}
    } else {
      el.innerHTML = '<div class="box"><p class="hint">Code bulunamadı. Etsy Callback URL ile bu sayfa birebir eşleşmeli:<br><code>https://mekanloop.github.io/shopentegro-desktop-app/oauth/callback.html</code></p></div>';
    }

    function copyCode(silent) {
      const node = document.getElementById('code');
      if (!node) return;
      navigator.clipboard.writeText(node.innerText).then(function () {
        if (!silent) alert('Kopyalandı! Product Intelligence Studio\'ya yapıştır.');
      }).catch(function () {});
    }
  </script>
</body>
</html>
