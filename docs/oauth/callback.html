<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEntegro — Giriş</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      color: #f8fafc;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      line-height: 1;
    }

    h1 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f1f5f9;
    }

    p {
      font-size: 0.9375rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    .error h1 {
      color: #fca5a5;
    }

    .success h1 {
      color: #86efac;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ShopEntegro</div>

    <div id="loading">
      <div class="spinner"></div>
      <h1>Giriş tamamlanıyor</h1>
      <p>Uygulamaya yönlendiriliyorsunuz…</p>
    </div>

    <div id="success" class="hidden success">
      <div class="icon">✓</div>
      <h1>Giriş başarılı</h1>
      <p>ShopEntegro uygulamasına dönebilirsiniz. Bu pencere kapanmazsa manuel olarak kapatabilirsiniz.</p>
    </div>

    <div id="error" class="hidden error">
      <div class="icon">✕</div>
      <h1>Giriş başarısız</h1>
      <p id="error-message">Bir hata oluştu. Lütfen uygulamadan tekrar deneyin.</p>
    </div>
  </div>

  <script>
    (function () {
      var APP_SCHEME = "shopentegro://oauth/callback";
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var state = params.get("state");
      var error = params.get("error");
      var errorDescription = params.get("error_description");

      var loadingEl = document.getElementById("loading");
      var successEl = document.getElementById("success");
      var errorEl = document.getElementById("error");
      var errorMessageEl = document.getElementById("error-message");

      function show(el) {
        loadingEl.classList.add("hidden");
        successEl.classList.add("hidden");
        errorEl.classList.add("hidden");
        el.classList.remove("hidden");
      }

      function buildRedirectUrl() {
        var url = new URL(APP_SCHEME);

        if (code) url.searchParams.set("code", code);
        if (state) url.searchParams.set("state", state);
        if (error) url.searchParams.set("error", error);
        if (errorDescription) url.searchParams.set("error_description", errorDescription);

        return url.toString();
      }

      if (error) {
        show(errorEl);
        errorMessageEl.textContent = errorDescription || error;
        return;
      }

      if (!code) {
        show(errorEl);
        errorMessageEl.textContent = "Yetkilendirme kodu bulunamadı.";
        return;
      }

      window.location.href = buildRedirectUrl();

      setTimeout(function () {
        show(successEl);
      }, 1500);

      setTimeout(function () {
        window.close();
      }, 3000);
    })();
  </script>
</body>
</html>
